<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Academias</title>
<style>
  /* Estilos generales */
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #608cb8; /* Color de fondo del Home */
    color: #333;
  }

  /* Contenedor principal */
  .container {
    max-width: 800px;
    margin: 20px auto;
    padding: 20px;
    background-color:  #497aab68;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  /* Título principal */
  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #2c3e50;
  }

  /* Formularios y secciones */
  form {
    display: flex;
    flex-direction: column;
  }

  label {
    margin-top: 10px;
    font-weight: bold;
  }

  input, select, button {
    margin-top: 5px;
    padding: 8px;
    font-size: 1em;
    border-radius: 4px;
    border: 1px solid #ccc;
  }

  button {
    margin-top: 15px;
    background-color: oklch(72.887% 0.21192 147.841 / 0.582);
    color: #fff;
    border: none;
    cursor: pointer;
  }

  button:hover {
    background-color: #3498db;
  }

  /* Sección de academias */
  .academias {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    margin-top: 20px;
  }

  .academia-card {
    flex: 1 1 calc(33% - 20px);
    background-color: #ecf0f1;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  .academia-card:hover {
    background-color: #d0d7de;
  }

  /* Perfil de academia */
  .perfil {
    margin-top: 20px;
    border: 1px solid #bdc3c7;
    padding: 15px;
    border-radius: 8px;
  }

  /* Solicitud aprobada */
  .aprobada {
    text-align: center;
    margin-top: 20px;
    font-size: 1.2em;
    color: green;
  }

  /* Escondiendo elementos por defecto */
  .hidden {
    display: none;
  }
</style>
</head>
<body>

<h1>Academias de artes</h1>

<!-- Sección de registro inicial -->
<div class="container" id="registro">
  <h2>Registro de Usuario</h2>
  <form id="registroForm">
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" required />

    <label for="apellido">Apellido:</label>
    <input type="text" id="apellido" required />

    <label for="email">Email:</label>
    <input type="email" id="email" required />

    <label for="password">Contraseña:</label>
    <input type="password" id="password" required />

    <label for="telefono">Teléfono:</label>
    <input type="tel" id="telefono" required />

    <label for="rol">Rol:</label>
    <select id="rol" required>
      <option value="">Seleccione rol</option>
      <option value="student">Estudiante</option>
      <option value="admin">Administrador</option>
      <option value="admin">Academia</option>
    </select>

    <button type="submit">Registrarse</button>
  </form>
</div>

<!-- Sección del catálogo de academias (mostrada después del registro) -->
<div class="container" id="catalogo" class="hidden" style="display:none;">
  <h2>Catálogo de Academias</h2>
  <div class="academias" id="academias">
    <!-- Aquí se agregarán las academias dinámicamente -->
    <div class="academia-card" data-nombre="Canto" data-info="Academia de canto..." onclick="mostrarPerfil('Canto')">Canto</div>
    <div class="academia-card" data-nombre="Baile" data-info="Academia de baile..." onclick="mostrarPerfil('Baile')">Baile</div>
    <div class="academia-card" data-nombre="Instrumentos" data-info="Academia de instrumentos..." onclick="mostrarPerfil('Instrumentos')">Instrumentos</div>
  </div>
</div>

<!-- Perfil de la academia -->
<div class="container perfil" id="perfil" style="display:none;">
  <h2 id="nombreAcademia"></h2>
  <p><strong>Logo o Foto:</strong> <img src="https://via.placeholder.com/100" alt="Logo" id="logo" /></p>
  <p><strong>Ubicación:</strong> <span id="ubicacion"></span></p>
  <p><strong>Método:</strong> <span id="metodo"></span></p>
  <p><strong>Horarios:</strong> <span id="horarios"></span></p>
  <p><strong>Pago: 25$ </strong> <span id="pago"></span></p>
  <button onclick="mostrarFormularioInscripcion()">Inscribirse</button>
</div>

<!-- Formulario de inscripción -->
<div class="container" id="formularioInscripcion" style="display:none;">
  <h2>Formulario de Inscripción</h2>
  <form id="inscripcionForm">
    <label for="nombreIns">Nombre:</label>
    <input type="text" id="nombreIns" required />

    <label for="apellidoIns">Apellido:</label>
    <input type="text" id="apellidoIns" required />

    <label for="apellidoIns">Horarios:</label>
    <select id="metodoPago" required>
      <option value="">Seleccione horario</option>
      <option value="lunes">Lunes 3pm a 6pm</option>
      <option value="miercoles"> Miercoles 4pm a 7pm</option>
      <option value="sabado"> Sabado 9am a 1pm</option>
    </select>

    <label for="emailIns">Email:</label>
    <input type="email" id="emailIns" required />

    <label for="metodoPago">Método de Pago:</label>
    <select id="metodoPago" required>
      <option value="">Seleccione método</option>
      <option value="tarjeta">Pago movil </option>
      <option value="paypal">Binance</option>
      <option value="efectivo">Efectivo</option>
    </select>

    <button type="submit">Enviar Solicitud</button>
  </form>
</div>

<!-- Solicitud aprobada -->
<div class="aprobada" id="solicitudAprobada" style="display:none;">
  <p>¡Solicitud aprobada! Gracias por inscribirte.</p>
</div>

<script>
  // Variables para almacenar datos
  let academiaSeleccionada = null;

  // Función para manejar registro
  document.getElementById('registroForm').addEventListener('submit', function(e) {
    e.preventDefault();
    // Ocultar formulario de registro
    document.getElementById('registro').style.display = 'none';
    // Mostrar catálogo
    document.getElementById('catalogo').style.display = 'block';
  });

  // Función para mostrar perfil de academia
  function mostrarPerfil(nombre) {
    // Datos de ejemplo
    const datosAcademias = {
      'Canto': {
        nombre: 'Academia de Canto',
        logo: 'https://via.placeholder.com/100?text=Canto',
        ubicacion: 'Av. Principal #123',
        metodo: 'Clases presenciales y en línea',
        horarios: 'Lunes a Viernes 10am - 6pm',
        pago: 'Pago mensual'
      },
      'Baile': {
        nombre: 'Academia de Baile',
        logo: 'https://via.placeholder.com/100?text=Baile',
        ubicacion: 'Calle Secundaria #456',
        metodo: 'Clases presenciales',
        horarios: 'Lunes a Sábado 9am - 7pm',
        pago: 'Pago por clase o mensual'
      },
      'Instrumentos': {
        nombre: 'Academia de Instrumentos',
        logo: 'https://via.placeholder.com/100?text=Instrumentos',
        ubicacion: 'Calle Tercera #789',
        metodo: 'Clases presenciales y en línea',
        horarios: 'Martes a Domingo 11am - 8pm',
        pago: 'Pago trimestral'
      }
    };

    academiaSeleccionada = datosAcademias[nombre];

    // Mostrar perfil
    document.getElementById('nombreAcademia').textContent = academiaSeleccionada.nombre;
    document.getElementById('logo').src = academiaSeleccionada.logo;
    document.getElementById('ubicacion').textContent = academiaSeleccionada.ubicacion;
    document.getElementById('metodo').textContent = academiaSeleccionada.metodo;
    document.getElementById('horarios').textContent = academiaSeleccionada.horarios;
    document.getElementById('pago').textContent = academiaSeleccionada.pago;

    document.getElementById('perfil').style.display = 'block';

    // Ocultar formulario de inscripción y solicitud aprobada si estaban visibles
    document.getElementById('formularioInscripcion').style.display = 'none';
    document.getElementById('solicitudAprobada').style.display = 'none';
  }

  // Función para mostrar formulario de inscripción
  function mostrarFormularioInscripcion() {
    document.getElementById('formularioInscripcion').style.display = 'block';
    document.getElementById('solicitudAprobada').style.display = 'none';
  }

  // Manejar envío del formulario de inscripción
  document.getElementById('inscripcionForm').addEventListener('submit', function(e) {
    e.preventDefault();
    // Aquí puedes agregar lógica para enviar datos
    // Mostrar mensaje de solicitud aprobada
    document.getElementById('solicitudAprobada').style.display = 'block';
    // Ocultar formulario de inscripción
    document.getElementById('formularioInscripcion').style.display = 'none';
  });
</script>

</body>
</html>
